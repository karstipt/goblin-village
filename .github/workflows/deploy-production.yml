name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    name: Deploy Frontend (Production)
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install & Build
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: https://api.goblinvillage.gg
          VITE_ENV: production

      - name: Deploy to CF Pages (Production)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: goblin-village
          directory: dist
          branch: main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy-worker:
    runs-on: ubuntu-latest
    name: Deploy Worker (Production)
    needs: deploy-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm ci
        working-directory: worker
      - name: Deploy Worker Production
        run: npx wrangler deploy --env production
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  notify:
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-worker]
    name: Notify Discord
    steps:
      - name: Discord Notification
        uses: Ilshidur/action-discord@master
        with:
          args: '🚀 Goblin Village deployed to production! https://goblinvillage.gg'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
